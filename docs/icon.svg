<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <title>AuthLens Icon</title>
  <desc>A developer tool icon representing an authentication flow viewed through a lens.</desc>

  <defs>
    <linearGradient id="bg" x1="96" y1="64" x2="416" y2="448" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0F172A"/>
      <stop offset="1" stop-color="#1E293B"/>
    </linearGradient>

    <linearGradient id="lens" x1="150" y1="118" x2="346" y2="326" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#38BDF8"/>
      <stop offset="1" stop-color="#06B6D4"/>
    </linearGradient>

    <linearGradient id="line" x1="168" y1="234" x2="330" y2="234" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#67E8F9"/>
      <stop offset="1" stop-color="#3B82F6"/>
    </linearGradient>

    <filter id="softShadow" x="40" y="40" width="432" height="432" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#020617" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect x="48" y="48" width="416" height="416" rx="96" fill="url(#bg)"/>

  <g filter="url(#softShadow)">
    <circle cx="244" cy="224" r="118" fill="#0F172A" stroke="url(#lens)" stroke-width="24"/>
    <path d="M326 306L398 378" stroke="url(#lens)" stroke-width="34" stroke-linecap="round"/>
  </g>

  <g>
    <path d="M166 224H322" stroke="url(#line)" stroke-width="18" stroke-linecap="round"/>
    <path d="M244 170V278" stroke="#155E75" stroke-width="14" stroke-linecap="round" opacity="0.45"/>

    <circle cx="166" cy="224" r="26" fill="#E0F2FE" stroke="#38BDF8" stroke-width="10"/>
    <circle cx="244" cy="224" r="30" fill="#ECFEFF" stroke="#06B6D4" stroke-width="10"/>
    <circle cx="322" cy="224" r="26" fill="#E0F2FE" stroke="#3B82F6" stroke-width="10"/>

    <path d="M232 224L241 233L258 214" stroke="#0F172A" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <path d="M174 146C190 132 212 124 244 124" stroke="#BAE6FD" stroke-width="12" stroke-linecap="round" opacity="0.8"/>
</svg>
